services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    ports:
      - "3000:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL}
      - OPENROUTER_DOCUMENT_MODEL=${OPENROUTER_DOCUMENT_MODEL}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME}
      - CHROMA_URL=http://chroma:8000
      - CHROMA_COLLECTION=${CHROMA_COLLECTION}
    depends_on:
      - chroma
    networks:
      - dsti_rag_network

  chroma:
    image: ghcr.io/chroma-core/chroma:0.5.23
    container_name: dsti_rag_chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - dsti_rag_network

volumes:
  chroma_data:

networks:
  dsti_rag_network:
    driver: bridge
